name: Daily Sponsor-Friendly QA/SDET Job Links

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Run only priority companies with debug details"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      send_email:
        description: "Send the result email"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      update_seen:
        description: "Update seen_jobs.json after successful email"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      max_companies:
        description: "Optional maximum number of companies to search"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  job-search:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest -q

      - name: Search jobs and send email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          TEST_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.test_mode || 'false' }}
          SEND_EMAIL: ${{ github.event_name == 'workflow_dispatch' && inputs.send_email || 'true' }}
          UPDATE_SEEN: ${{ github.event_name == 'workflow_dispatch' && inputs.update_seen || 'true' }}
          MAX_COMPANIES: ${{ github.event_name == 'workflow_dispatch' && inputs.max_companies || '' }}
        run: python src/main.py

      - name: Upload search debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-search-debug-results
          path: |
            data/raw_results.json
            data/filtered_results.json
            data/rejected_results.json
            data/search_failures.json
          if-no-files-found: warn

      - name: Commit updated seen jobs
        if: always() && (github.event_name != 'workflow_dispatch' || inputs.update_seen == 'true')
        run: |
          if git diff --quiet -- data/seen_jobs.json; then
            echo "No seen job changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen_jobs.json
          git commit -m "Update seen jobs"
          git push
